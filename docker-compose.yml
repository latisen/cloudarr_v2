version: "3.9"

services:
  decypharr:
    build:
      context: .
      dockerfile: Dockerfile.local
    container_name: cloudarr
    ports:
      - "8282:8282"
    volumes:
      - /mnt/debrid:/mnt/debrid:ro
      - /mnt/downloads:/mnt/downloads
      - /mnt/config/decypharr:/app
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=022
      - TZ=Europe/Stockholm
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    ports:
      - "8989:8989"
    volumes:
      - /mnt/config/sonarr:/config
      - /mnt/media/tv:/tv
      - /mnt/downloads:/downloads
      - /mnt/debrid:/mnt/debrid:ro
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Stockholm
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    ports:
      - "7878:7878"
    volumes:
      - /mnt/config/radarr:/config
      - /mnt/media/movies:/movies
      - /mnt/downloads:/downloads
      - /mnt/debrid:/mnt/debrid:ro
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Stockholm
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    ports:
      - "9696:9696"
    volumes:
      - /mnt/config/prowlarr:/config
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Stockholm
    restart: unless-stopped

  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    network_mode: host
    volumes:
      - /mnt/config/plex:/config
      - /mnt/media/tv:/tv
      - /mnt/media/movies:/movies
      - /mnt/downloads:/downloads
      - /mnt/debrid:/mnt/debrid:ro
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Stockholm
      - VERSION=latest
    restart: unless-stopped
